---
# Martin vector tile server v1.3.1
# https://maplibre.org/martin/config-file.html

listen_addresses: "0.0.0.0:3000"
worker_processes: 2

postgres:
  connection_string: ${DATABASE_URL}
  pool_size: 20
  # Tables with SRID=0 in geometry_columns need a fallback SRID.
  # All ECG data is WGS84 (EPSG:4326).
  default_srid: 4326
  auto_publish:
    tables:
      from_schemas:
        - dbo
    functions:
      from_schemas:
        - dbo
